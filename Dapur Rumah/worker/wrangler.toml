name = "dapur-rumah-api"
main = "src/index.ts"
compatibility_date = "2025-12-01"
compatibility_flags = [ "nodejs_compat" ]

# Runtime vars (production defaults)
[vars]
BETTER_AUTH_URL = "https://dapur-rumah-api.afuitdev.workers.dev"
FRONTEND_URL = "https://afu-it.github.io"
WORKER_URL = "https://dapur-rumah-api.afuitdev.workers.dev"
ALLOWED_ORIGINS = "https://afu-it.github.io,http://127.0.0.1:5500,http://localhost:5500,http://localhost:5173"

[[d1_databases]]
binding = "DB"
database_name = "dapur-db"
database_id = "048d94cb-e30a-4598-8e44-205555a4764a"
migrations_dir = "../migrations"

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "dapur-img"
