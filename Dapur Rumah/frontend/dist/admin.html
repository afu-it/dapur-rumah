<!DOCTYPE html>
<html lang="ms">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#ef4444">
    <title>Admin — Dapur Rumah</title>
    <style>
        .admin-header {
            background: linear-gradient(135deg, #1e293b, #334155);
            padding: 1rem 1.5rem;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .admin-badge {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: #fca5a5;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border-radius: 999px;
            padding: 0.2rem 0.6rem;
        }

        .admin-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
        }

        .admin-table th {
            text-align: left;
            padding: 0.75rem;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            border-bottom: 2px solid var(--border-color);
            white-space: nowrap;
        }

        .admin-table td {
            padding: 0.75rem;
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
        }

        .admin-table tr:hover td {
            background: var(--bg-color);
        }

        .seller-cell {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .seller-mini-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            background: var(--primary-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: white;
            font-size: 0.875rem;
            flex-shrink: 0;
        }

        .toggle-btn {
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.3rem 0.7rem;
            border-radius: 999px;
            border: none;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .toggle-btn.on {
            background: rgba(34, 197, 94, 0.1);
            color: #16a34a;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .toggle-btn.off {
            background: rgba(100, 116, 139, 0.1);
            color: #64748b;
            border: 1px solid rgba(100, 116, 139, 0.2);
        }

        .toggle-btn:hover {
            filter: brightness(0.9);
        }

        .admin-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .admin-stat {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            padding: 1.25rem;
            text-align: center;
        }

        .admin-stat-val {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary-color);
            margin: 0;
        }

        .admin-stat-lbl {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin: 0.25rem 0 0;
        }

        .search-admin {
            width: 100%;
            padding: 0.7rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            outline: none;
        }

        .search-admin:focus {
            border-color: var(--primary-color);
        }

        #access-denied {
            display: none;
            text-align: center;
            padding: 6rem 2rem;
        }

        #admin-content {
            display: none;
        }
    </style>
  <script type="module" crossorigin src="/assets/admin-J34rywi8.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-B5Qt9EMX.js">
  <link rel="modulepreload" crossorigin href="/assets/api-Cl8Z2mE8.js">
  <link rel="stylesheet" crossorigin href="/assets/admin-DEDh9wa4.css">
  <link rel="stylesheet" crossorigin href="/assets/globals-BOXglrR5.css">
</head>

<body>
    <header class="admin-header">
        <div style="display:flex; align-items:center; gap:1rem;">
            <a href="index.html" style="color:white; text-decoration:none; font-weight:700;">Dapur Rumah</a>
            <span class="admin-badge">Admin</span>
        </div>
        <div style="display:flex; align-items:center; gap:1rem;">
            <span id="admin-user" style="font-size:0.875rem; opacity:0.8;"></span>
            <button id="logout-btn" class="btn"
                style="font-size:0.8rem; padding:0.4rem 0.9rem; background:rgba(255,255,255,0.15); color:white; border:1px solid rgba(255,255,255,0.2);">Log
                Keluar</button>
        </div>
    </header>

    <!-- Access Denied -->
    <div id="access-denied">
        <h2 style="color:var(--error-color);">🚫 Akses Ditolak</h2>
        <p class="text-muted">Anda tidak mempunyai akses admin.</p>
        <a href="index.html" class="btn btn-primary" style="margin-top:1rem;">Kembali ke Laman Utama</a>
    </div>

    <!-- Admin Content -->
    <div id="admin-content" class="dashboard-container" style="padding-top:2rem;">

        <!-- Stats -->
        <div class="admin-stats" id="admin-stats">
            <div class="admin-stat">
                <p class="admin-stat-val" id="total-sellers">—</p>
                <p class="admin-stat-lbl">Jumlah Peniaga</p>
            </div>
            <div class="admin-stat">
                <p class="admin-stat-val" id="total-featured">—</p>
                <p class="admin-stat-lbl">Peniaga Pilihan</p>
            </div>
            <div class="admin-stat">
                <p class="admin-stat-val" id="total-active">—</p>
                <p class="admin-stat-lbl">Peniaga Aktif</p>
            </div>
        </div>

        <!-- Sellers table -->
        <section class="card">
            <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:1rem;">
                <h2 style="margin:0;">Pengurusan Peniaga</h2>
                <button class="btn btn-outline" id="refresh-btn" style="font-size:0.8rem; padding:0.4rem 0.9rem;">🔄
                    Segarkan</button>
            </div>
            <input type="text" id="seller-search" class="search-admin" placeholder="Cari nama kedai atau negeri...">
            <div style="overflow-x:auto;">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Peniaga</th>
                            <th>Negeri</th>
                            <th style="text-align:center;">Produk</th>
                            <th style="text-align:center;">Pilihan ⭐</th>
                            <th style="text-align:center;">Status</th>
                            <th>Tindakan</th>
                        </tr>
                    </thead>
                    <tbody id="seller-rows">
                        <tr>
                            <td colspan="6" style="text-align:center; color:#94a3b8; padding:2rem;">Memuatkan...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>

</body>

</html>
