<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#FF6B35">
    <title>Dashboard Seller — Dapur Rumah</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/globals.css">
    <style>
        :root {
            --primary: #FF6B35;
            --primary-dark: #E85A24;
            --primary-light: #FFF0EB;
            --text: #1A1A2E;
            --text-muted: #636E72;
            --bg: #FAFBFC;
            --surface: #FFFFFF;
            --border: #E8ECEF;
            --success: #00B894;
            --danger: #EF4444;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.08);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 20px;
            --radius-xl: 28px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        html, body {
            height: 100%;
            font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
            background: #E0E5EC;
            color: var(--text);
            overflow: hidden;
        }

        .dashboard-container {
            width: 100%;
            max-width: 420px;
            height: 100%;
            margin: 0 auto;
            background: var(--bg);
            position: relative;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            padding-bottom: 80px;
        }

        @media (min-width: 440px) {
            .dashboard-container {
                height: 95%;
                margin-top: 2.5%;
                border-radius: 24px;
            }
        }

        .dash-header {
            background: var(--surface);
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .dash-header h1 {
            font-size: 18px;
            font-weight: 700;
        }

        .dash-header a {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
        }

        .dash-content {
            padding: 20px;
        }

        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--surface);
            padding: 16px;
            border-radius: var(--radius-md);
            text-align: center;
            box-shadow: var(--shadow-sm);
        }

        .stat-icon {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 800;
            color: var(--primary);
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* Section */
        .dash-section {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-sm);
        }

        .dash-section h2 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Shop Info */
        .shop-info {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
        }

        .shop-avatar {
            width: 60px;
            height: 60px;
            background: var(--primary-light);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }

        .shop-details h3 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .shop-details p {
            font-size: 13px;
            color: var(--text-muted);
        }

        .shop-meta {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }

        .shop-meta span {
            background: var(--primary-light);
            color: var(--primary);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        /* Products */
        .product-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .product-item {
            display: flex;
            gap: 12px;
            padding: 12px;
            background: var(--bg);
            border-radius: var(--radius-md);
        }

        .product-img {
            width: 70px;
            height: 70px;
            border-radius: var(--radius-sm);
            object-fit: cover;
            background: #eee;
        }

        .product-info {
            flex: 1;
        }

        .product-name {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .product-price {
            font-size: 15px;
            font-weight: 800;
            color: var(--primary);
        }

        .product-status {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            margin-top: 6px;
        }

        .status-ada {
            background: #D1FAE5;
            color: #059669;
        }

        .status-preorder {
            background: #FEF3C7;
            color: #D97706;
        }

        .status-habis {
            background: #FEE2E2;
            color: #DC2626;
        }

        /* Buttons */
        .btn-edit {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 12px;
        }

        .btn-logout {
            background: var(--danger);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: var(--radius-md);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        .demo-badge {
            background: var(--primary);
            color: white;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
            margin-left: 8px;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <header class="dash-header">
            <h1>Dashboard Seller</h1>
            <a href="index.html">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
                Back to App
            </a>
        </header>

        <div class="dash-content">
            <!-- Demo Badge -->
            <div id="demo-badge-container" style="display:none; margin-bottom:16px;">
                <span class="demo-badge">DEMO MODE</span>
            </div>

            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">👁️</div>
                    <div class="stat-value" id="stat-views">0</div>
                    <div class="stat-label">Pandangan</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">💬</div>
                    <div class="stat-value" id="stat-clicks">0</div>
                    <div class="stat-label">Klik WhatsApp</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">📦</div>
                    <div class="stat-value" id="stat-products">0</div>
                    <div class="stat-label">Produk</div>
                </div>
            </div>

            <!-- Shop Profile -->
            <div class="dash-section">
                <h2>
                    Profil Kedai
                    <button id="logout-btn" class="btn-logout" style="display:none;">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                        Logout
                    </button>
                </h2>
                
                <div class="shop-info">
                    <div class="shop-avatar" id="shop-avatar">🏪</div>
                    <div class="shop-details">
                        <h3 id="shop-name">-</h3>
                        <p id="shop-desc">-</p>
                        <div class="shop-meta">
                            <span id="shop-state">-</span>
                            <span id="shop-phone">-</span>
                        </div>
                    </div>
                </div>

                <button class="btn-edit" onclick="editShopProfile()">Edit Profil</button>
            </div>

            <!-- Products -->
            <div class="dash-section">
                <h2>Senarai Produk</h2>
                <div class="product-list" id="products-list">
                    <div class="empty-state">Tiada produk</div>
                </div>
                <button class="btn-edit" onclick="addNewProduct()">+ Tambah Produk</button>
            </div>
        </div>
    </div>

    <script>
        // Demo Data
        const DEMO_ACCOUNTS = {
            '1': {
                name: 'Nur Aina',
                shopName: 'Dapur Aina Kampung',
                description: 'Masakan kampung, lauk tradisional, dan kuih harian.',
                phone: '601133336601',
                state: 'Selangor',
                products: [
                    { id: 'demo-1-1', name: 'Ayam Percik Madu', description: 'Ayam percik berempah', price: 18.0, status: 'ada_stok', image: 'https://images.unsplash.com/photo-1604908176997-125f25cc6f3d?auto=format&fit=crop&q=80&w=300', views: 184, clicks: 27 },
                    { id: 'demo-1-2', name: 'Kuih Seri Muka', description: 'Seri muka pandan', price: 12.0, status: 'preorder', image: 'https://images.unsplash.com/photo-1605333396914-230f293a9089?auto=format&fit=crop&q=80&w=300', views: 112, clicks: 19 },
                    { id: 'demo-1-3', name: 'Air Asam Boi', description: 'Minuman sejuk segar', price: 5.5, status: 'habis', image: 'https://images.unsplash.com/photo-1513558161293-cdaf765ed2fd?auto=format&fit=crop&q=80&w=300', views: 61, clicks: 8 }
                ]
            },
            '2': {
                name: 'Hakim Roslan',
                shopName: 'Kitchen Hakim Utara',
                description: 'Menu utara, dessert, dan makanan frozen homemade.',
                phone: '60185550772',
                state: 'Kedah',
                products: [
                    { id: 'demo-2-1', name: 'Nasi Daging Utara', description: 'Nasi daging berempah', price: 16.5, status: 'ada_stok', image: 'https://images.unsplash.com/photo-1626804475297-4160aae2fa44?auto=format&fit=crop&q=80&w=300', views: 147, clicks: 23 },
                    { id: 'demo-2-2', name: 'Brownie Kedut', description: 'Brownie coklat pekat', price: 28.0, status: 'preorder', image: 'https://images.unsplash.com/photo-1578985545062-69928b1d9587?auto=format&fit=crop&q=80&w=300', views: 95, clicks: 12 },
                    { id: 'demo-2-3', name: 'Keropok Lekor Crispy', description: 'Rangup dan sedap', price: 10.0, status: 'ada_stok', image: 'https://images.unsplash.com/photo-1628294895950-9805252327bc?auto=format&fit=crop&q=80&w=300', views: 132, clicks: 17 }
                ]
            }
        };

        // Get URL params
        const urlParams = new URLSearchParams(window.location.search);
        const demoId = urlParams.get('demo');

        // If demo mode, load demo data
        if (demoId && DEMO_ACCOUNTS[demoId]) {
            loadDemoData(demoId);
        }

        function loadDemoData(accountId) {
            const data = DEMO_ACCOUNTS[accountId];
            
            // Show demo badge
            document.getElementById('demo-badge-container').style.display = 'block';
            
            // Show logout button
            document.getElementById('logout-btn').style.display = 'flex';
            document.getElementById('logout-btn').onclick = () => {
                window.location.href = 'index.html';
            };

            // Update shop info
            document.getElementById('shop-name').textContent = data.shopName;
            document.getElementById('shop-desc').textContent = data.description;
            document.getElementById('shop-state').textContent = data.state;
            document.getElementById('shop-phone').textContent = '📱 ' + data.phone;

            // Update stats
            const totalViews = data.products.reduce((sum, p) => sum + p.views, 0);
            const totalClicks = data.products.reduce((sum, p) => sum + p.clicks, 0);
            document.getElementById('stat-views').textContent = totalViews;
            document.getElementById('stat-clicks').textContent = totalClicks;
            document.getElementById('stat-products').textContent = data.products.length;

            // Render products
            renderProducts(data.products);

            // Save to localStorage so home page can use
            localStorage.setItem('dapur_rumah_products', JSON.stringify(data.products));
            localStorage.setItem('dapur_rumah_seller', JSON.stringify({
                name: data.shopName,
                phone: data.phone,
                state: data.state
            }));
        }

        function renderProducts(products) {
            const container = document.getElementById('products-list');
            
            const statusLabels = {
                'ada_stok': { text: 'Ada Stok', class: 'status-ada' },
                'preorder': { text: 'Pre-Order', class: 'status-preorder' },
                'habis': { text: 'Habis', class: 'status-habis' }
            };

            container.innerHTML = products.map(p => `
                <div class="product-item">
                    <img src="${p.image}" alt="${p.name}" class="product-img">
                    <div class="product-info">
                        <div class="product-name">${p.name}</div>
                        <div class="product-price">RM ${p.price.toFixed(2)}</div>
                        <span class="product-status ${statusLabels[p.status].class}">${statusLabels[p.status].text}</span>
                    </div>
                </div>
            `).join('');
        }

        function editShopProfile() {
            alert('Edit profil功能将在完整版本中提供');
        }

        function addNewProduct() {
            alert('Tambah produk功能将在完整版本中提供');
        }
    </script>
</body>
</html>
