<!DOCTYPE html>
<html lang="ms">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Daftar sebagai peniaga di Dapur Rumah.">
    <meta name="theme-color" content="#ef4444">
    <link rel="manifest" href="manifest.json">

    <title>Daftar Peniaga — Dapur Rumah</title>
    <link rel="stylesheet" href="css/globals.css">
    <link rel="stylesheet" href="css/pages/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h2>Daftar Peniaga Baru</h2>
                <p>Mula jual makanan dari rumah hari ini</p>
            </div>

            <form id="register-form">
                <div class="form-group">
                    <label for="name">Nama Penuh</label>
                    <input type="text" id="name" name="name" required placeholder="Ahmad Bin Ali">
                </div>

                <div class="form-group">
                    <label for="email">E-mel</label>
                    <input type="email" id="email" name="email" required placeholder="nama@email.com">
                </div>

                <div class="form-group">
                    <label for="password">Kata Laluan</label>
                    <input type="password" id="password" name="password" required minlength="8"
                        placeholder="Minimum 8 aksara">
                </div>

                <div id="error-message" class="error-text" style="display: none;"></div>

                <button type="submit" id="submit-btn" class="btn-primary">
                    <span class="btn-text">Daftar Akaun</span>
                    <span class="btn-loader" style="display: none;">Mendaftar...</span>
                </button>

                <!-- Divider -->
                <div style="display:flex; align-items:center; gap:1rem; margin:1rem 0;">
                    <div style="flex:1; height:1px; background:var(--border-color);"></div>
                    <span style="font-size:0.8rem; color:var(--text-muted);">atau</span>
                    <div style="flex:1; height:1px; background:var(--border-color);"></div>
                </div>

                <!-- Google Sign-In -->
                <button type="button" id="google-signup-btn"
                    style="width:100%; padding:0.75rem; border:1px solid var(--border-color); border-radius:var(--border-radius); background:var(--surface-color); cursor:pointer; display:flex; align-items:center; justify-content:center; gap:0.75rem; font-size:0.925rem; font-weight:500; color:var(--text-color); transition:background 0.2s;">
                    <svg width="20" height="20" viewBox="0 0 24 24">
                        <path fill="#4285F4"
                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                        <path fill="#34A853"
                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                        <path fill="#FBBC05"
                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                        <path fill="#EA4335"
                            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                    </svg>
                    Daftar dengan Google
                </button>
            </form>

            <div class="auth-footer">
                Sudah ada akaun? <a href="login.html">Log masuk</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { injectBottomNav } from './js/ui.js';
        injectBottomNav('account');
        import { register } from './js/auth.js';

        const form = document.getElementById('register-form');
        const submitBtn = document.getElementById('submit-btn');
        const errorMsg = document.getElementById('error-message');
        const btnText = document.querySelector('.btn-text');
        const btnLoader = document.querySelector('.btn-loader');
        const dashboardPath = `${import.meta.env.BASE_URL}dashboard.html`;

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            errorMsg.style.display = 'none';
            btnText.style.display = 'none';
            btnLoader.style.display = 'inline';
            submitBtn.disabled = true;

            try {
                await register(name, email, password);
                // On success, redirect to dashboard where they can complete their shop profile
                window.location.href = `${dashboardPath}?registered=true`;
            } catch (error) {
                errorMsg.textContent = error.message || "Pendaftaran gagal. Sila cuba lagi.";
                errorMsg.style.display = 'block';
            } finally {
                btnText.style.display = 'inline';
                btnLoader.style.display = 'none';
                submitBtn.disabled = false;
            }
        });

        // Google Sign-Up
        const isLocalhost = window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost';
        const API_BASE = isLocalhost ? 'https://dapur-rumah-api.afuitdev.workers.dev' : '';
        const callbackURL = `${window.location.origin}${dashboardPath}`;
        const googleBtn = document.getElementById('google-signup-btn');
        if (googleBtn) {
            googleBtn.addEventListener('click', () => {
                window.location.href = API_BASE + '/api/auth/sign-in/social?provider=google&callbackURL=' + encodeURIComponent(callbackURL);
            });
        }
    </script>
</body>

</html>
