name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "Dapur Rumah/frontend/**"
      - ".github/workflows/deploy.yml"

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "./Dapur Rumah/frontend"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: "./Dapur Rumah/frontend/package-lock.json"
      - name: Install dependencies
        run: npm ci
      - name: Build project
        run: npm run build -- --base=/dapur-rumah/
      - name: Disable Jekyll for uploaded artifact
        run: touch dist/.nojekyll
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./Dapur Rumah/frontend/dist"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
